<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaula Institutional Archive - Scriptorium OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff9933; --bg: #fcfaf8; --text: #1c1917; --sidebar: #0c0a09; }
        .dark-theme { --bg: #1c1917; --text: #f5f5f4; --sidebar: #000000; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: all 0.3s ease; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden { display: none; }
        .saffron-btn { background-color: var(--accent); color: white; transition: all 0.2s; cursor: pointer; }
        .saffron-btn:hover { background-color: #e67e22; transform: translateY(-1px); }
        .demo-pill { cursor: pointer; @apply px-4 py-2 rounded-full border border-stone-200 text-[10px] font-black uppercase tracking-widest hover:bg-stone-50 transition-all text-stone-600; }
        .active-row { border-left: 4px solid var(--accent) !important; background-color: rgba(255, 153, 51, 0.1) !important; }
        #previewPane { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
        .sidebar-input { @apply w-full bg-stone-900 border-none rounded-xl p-3 text-[10px] text-stone-300 outline-none mb-3 cursor-text; }
        .clickable { cursor: pointer; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="authPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-stone-100">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-[450px] border border-stone-200 text-center">
            <h1 class="serif text-4xl text-stone-900 mb-2">Kaula Archive</h1>
            <p class="text-[10px] text-stone-400 uppercase tracking-[0.3em] font-bold mb-10">Institutional Entry</p>
            
            <div class="space-y-4 mb-10">
                <input type="text" id="uIn" placeholder="Username" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#ff9933] text-sm">
                <input type="password" id="pIn" placeholder="Password" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#ff9933] text-sm">
                <button onclick="handleLogin()" class="w-full saffron-btn py-4 rounded-2xl font-bold shadow-lg">Sign In</button>
            </div>

            <div class="pt-8 border-t border-stone-100">
                <p class="text-[9px] text-[#ff9933] font-black uppercase tracking-widest mb-4 italic">Quick Demo Access</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <div onclick="quickDemo('admin')" class="demo-pill border-orange-200 text-orange-700">Admin</div>
                    <div onclick="quickDemo('scholar')" class="demo-pill border-blue-200 text-blue-700">Scholar</div>
                    <div onclick="quickDemo('proof')" class="demo-pill">Proofreader</div>
                    <div onclick="quickDemo('typist')" class="demo-pill">Typist</div>
                    <div onclick="quickDemo('guest')" class="demo-pill bg-stone-900 text-white border-none">Guest</div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-full">
        
        <aside class="w-80 bg-stone-950 text-stone-400 flex flex-col border-r border-stone-900 overflow-y-auto">
            <div class="p-8 border-b border-stone-800">
                <h2 class="text-white font-bold tracking-tighter text-2xl italic">Archive <span class="text-[#ff9933] text-xs">OS</span></h2>
            </div>
            
            <div class="p-6">
                <nav class="space-y-1 mb-10">
                    <button onclick="switchView('catalog')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-white/5 transition-all text-sm clickable">📖 Library Catalog</button>
                    <button id="navAdmin" onclick="switchView('admin')" class="hidden w-full text-left px-4 py-2 rounded-lg text-[#ff9933] text-sm font-bold clickable">🛡️ Governance</button>
                    <button onclick="switchView('profile')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-white/5 transition-all text-sm clickable">👤 Account Settings</button>
                </nav>

                <div class="space-y-2">
                    <p class="px-4 text-[9px] uppercase tracking-widest font-black text-stone-700 mb-4">Hierarchical Search</p>
                    <input type="text" id="sideSearch" oninput="fetchLibrary()" placeholder="Filter by Title..." class="sidebar-input">
                    <select id="filterAuthor" onchange="fetchLibrary()" class="sidebar-input clickable">
                        <option value="">All Authors</option>
                        <option>Abhinavagupta</option><option>Utpaladeva</option><option>Vasugupta</option>
                    </select>
                    <select id="filterVol" onchange="fetchLibrary()" class="sidebar-input clickable">
                        <option value="">All Volumes</option>
                        <option>Vol 1</option><option>Vol 2</option><option>Vol 3</option>
                    </select>
                </div>

                <div id="resumeBox" class="hidden mt-8 p-4 bg-orange-900/10 rounded-2xl border border-orange-900/20">
                    <p class="text-[9px] text-orange-500 font-black uppercase mb-2">Resume Session</p>
                    <p id="resumeTitle" class="text-[10px] text-stone-300 italic mb-3">--</p>
                    <button onclick="handleResume()" class="w-full saffron-btn py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest">Continue Reading</button>
                </div>
            </div>

            <div class="mt-auto p-6 bg-black flex flex-col space-y-4 border-t border-stone-900">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs text-white font-bold" id="uiName">--</p>
                        <p class="text-[9px] uppercase text-stone-600 font-black tracking-widest" id="uiRole">--</p>
                    </div>
                    <button onclick="handleLogout()" class="text-[10px] font-black text-[#ff9933] hover:text-white uppercase transition-colors clickable">Exit Portal</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="h-16 flex items-center justify-between px-10 border-b border-stone-200 bg-white/50 backdrop-blur">
                <p class="text-[10px] font-black uppercase tracking-widest text-stone-400">Institutional Scriptorium V2.0</p>
                <button onclick="toggleTheme()" class="text-[10px] font-bold uppercase tracking-widest bg-stone-100 px-4 py-2 rounded-full clickable">Toggle Theme (Light/Dark)</button>
            </header>

            <section id="v-catalog" class="flex-1 flex flex-col p-10 overflow-hidden">
                <div id="catalogList" class="flex-1 overflow-y-auto space-y-3 pr-4"></div>
            </section>

            <section id="v-admin" class="hidden flex-1 p-16 overflow-y-auto">
                <h2 class="serif text-4xl mb-12">Governance</h2>
                <div class="bg-white rounded-[32px] border border-stone-200 overflow-hidden shadow-sm">
                    <table class="w-full text-left"><tbody id="adminTableBody"></tbody></table>
                </div>
            </section>
        </main>

        <aside id="previewPane" class="w-0 bg-white border-l border-stone-200 flex flex-col overflow-hidden">
            <div id="previewContent" class="p-10 invisible opacity-0 transition-opacity flex flex-col h-full"></div>
        </aside>
    </div>

    <script>
        const SB_URL = "https://gcgxcnbimqpfrowesfms.supabase.co";
        const SB_KEY = "sb_publishable_XObSGljjo-VILprIHw_Bxw_FKM7uUOU";
        const kClient = supabase.createClient(SB_URL, SB_KEY);
        let userRole = 'public';
        let isSanskrit = false;

        async function quickDemo(u) {
            document.getElementById('uIn').value = u;
            document.getElementById('pIn').value = "demo123";
            handleLogin();
        }

        async function handleLogin() {
            const user = document.getElementById('uIn').value;
            const pass = document.getElementById('pIn').value;
            const email = user.includes('@') ? user : user + "@kaula.org";
            const { data, error } = await kClient.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Access Denied"); else location.reload();
        }

        async function initApp() {
            const { data: { session } } = await kClient.auth.getSession();
            if (session) {
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadAppProfile(session.user);
            }
        }

        async function loadAppProfile(user) {
            const { data: profile } = await kClient.from('profiles').select('*').eq('id', user.id).single();
            userRole = profile?.role || 'public';
            document.getElementById('uiName').innerText = profile?.full_name || user.email.split('@')[0];
            document.getElementById('uiRole').innerText = userRole;
            if (userRole === 'admin') {
                document.getElementById('navAdmin').classList.remove('hidden');
                loadGovernanceData();
            }
            fetchLibrary();
        }

        async function fetchLibrary() {
            const sTitle = document.getElementById('sideSearch').value;
            const sAuth = document.getElementById('filterAuthor').value;
            const sVol = document.getElementById('filterVol').value;

            let query = kClient.from('manuscripts').select('*');
            if (sTitle) query = query.ilike('title_iast', `%${sTitle}%`);
            if (sAuth) query = query.eq('author', sAuth);
            if (sVol) query = query.ilike('subject', `%${sVol}%`);

            const { data } = await query.limit(30);
            document.getElementById('catalogList').innerHTML = data.map(m => `
                <div onclick="openStudyRoom(${JSON.stringify(m).replace(/"/g, '&quot;')}, this)" class="bg-white p-6 rounded-[24px] border border-stone-100 flex justify-between items-center hover:border-orange-300 cursor-pointer shadow-sm transition-all group clickable">
                    <div>
                        <h4 class="font-bold text-stone-800 group-hover:text-orange-900">${m.title_iast}</h4>
                        <p class="text-[9px] text-stone-400 font-bold uppercase tracking-widest">${m.subject}</p>
                    </div>
                </div>
            `).join('');
        }

        function openStudyRoom(m, el) {
            document.querySelectorAll('#catalogList > div').forEach(d => d.classList.remove('active-row'));
            el.classList.add('active-row');
            const pane = document.getElementById('previewPane');
            const content = document.getElementById('previewContent');
            pane.style.width = "650px";
            content.classList.remove('invisible', 'opacity-0');

            const canEdit = ['admin', 'typist', 'proofreader'].includes(userRole);
            content.innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <button onclick="closePane()" class="text-[9px] font-black uppercase text-stone-300 hover:text-black clickable">✕ Close</button>
                    <div class="flex items-center space-x-6">
                        <div class="flex items-center bg-stone-100 p-1 rounded-full px-4 border border-stone-200">
                            <span class="text-[9px] font-black text-stone-500 uppercase mr-3">Sanskrit Mode</span>
                            <input type="checkbox" onchange="isSanskrit = this.checked" class="w-4 h-4 cursor-pointer accent-orange-600">
                        </div>
                    </div>
                </div>
                <h2 class="serif text-4xl text-stone-900 mb-8">${m.title_iast}</h2>
                <div class="flex-1 flex flex-col">
                    <textarea id="liveEditor" ${!canEdit ? 'readonly' : ''} class="flex-1 w-full p-8 bg-stone-50 border border-stone-100 rounded-[40px] font-serif text-xl leading-relaxed outline-none resize-none">${m.content || ''}</textarea>
                </div>
                ${canEdit ? `<button onclick="saveManuscriptChanges(${m.id})" class="mt-8 saffron-btn py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl">Update & Timestamp</button>` : ''}
                <button class="w-full mt-3 bg-white border border-stone-200 text-stone-800 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest clickable">Download PDF</button>
            `;
        }

        function toggleTheme() { document.body.classList.toggle('dark-theme'); }
        function closePane() { document.getElementById('previewPane').style.width = "0px"; }
        async function handleLogout() { await kClient.auth.signOut(); location.reload(); }
        window.onload = initApp;
    </script>
</body>
</html>
