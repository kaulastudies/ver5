<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaula Archive - Varanasi Digital Lab</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --saffron: #ff9933; --stone: #1c1917; }
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf8; color: var(--stone); transition: background 0.3s; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden { display: none; }
        
        /* Cursor & Interaction Fixes */
        .clickable { cursor: pointer !important; }
        .active-row { border-left: 4px solid var(--saffron) !important; background-color: rgba(255, 153, 51, 0.05) !important; }
        
        /* Transitions */
        #previewPane { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Sidebar Styles */
        .sidebar-item { @apply w-full text-left px-4 py-2 rounded-xl text-sm transition-all clickable hover:bg-white/5; }
        .filter-input { @apply w-full bg-stone-900 border-none rounded-lg p-3 text-[10px] text-stone-400 outline-none mb-2; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="authPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-stone-100">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-[450px] border border-stone-200 text-center">
            <h1 class="serif text-4xl text-stone-900 mb-2">Kaula Archive</h1>
            <p class="text-[10px] text-stone-400 uppercase tracking-[0.3em] font-bold mb-10">Institutional Entry</p>
            
            <div class="space-y-4 mb-10">
                <input type="text" id="uIn" placeholder="Username" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#ff9933] text-sm">
                <input type="password" id="pIn" placeholder="Password" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#ff9933] text-sm">
                <button onclick="handleLogin()" class="w-full py-4 rounded-2xl font-bold text-white shadow-lg bg-[#ff9933] hover:bg-[#e67e22] clickable">Sign In</button>
            </div>

            <div class="pt-8 border-t border-stone-100">
                <p class="text-[9px] text-[#ff9933] font-black uppercase tracking-widest mb-4 italic">Quick Demo Access</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <div onclick="quickDemo('admin')" class="clickable border border-stone-200 px-4 py-2 rounded-full text-[10px] font-bold uppercase text-stone-600 hover:bg-stone-50">Admin</div>
                    <div onclick="quickDemo('scholar')" class="clickable border border-stone-200 px-4 py-2 rounded-full text-[10px] font-bold uppercase text-stone-600 hover:bg-stone-50">Scholar</div>
                    <div onclick="quickDemo('proof')" class="clickable border border-stone-200 px-4 py-2 rounded-full text-[10px] font-bold uppercase text-stone-600 hover:bg-stone-50">Proofreader</div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-full">
        
        <aside class="w-72 bg-stone-950 text-stone-400 flex flex-col border-r border-stone-900 shrink-0">
            <div class="p-8 border-b border-stone-900">
                <h2 class="text-white font-bold text-2xl italic">Archive <span class="text-[#ff9933] text-xs">OS</span></h2>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1">
                <nav class="space-y-1 mb-8">
                    <p class="px-4 text-[9px] uppercase tracking-widest font-black text-stone-700 mb-2">Library</p>
                    <button onclick="switchView('catalog')" class="sidebar-item">📖 Catalog</button>
                    <button id="navAdmin" onclick="switchView('admin')" class="hidden sidebar-item text-[#ff9933] font-bold">🛡️ Governance</button>
                    <button onclick="switchView('profile')" class="sidebar-item">👤 Settings</button>
                </nav>

                <div class="space-y-4">
                    <p class="px-4 text-[9px] uppercase tracking-widest font-black text-stone-700 mb-2">Vertical Shortlist</p>
                    <input type="text" id="sideSearch" oninput="fetchData()" placeholder="Shortlist by Title..." class="filter-input">
                    <select id="fAuthor" onchange="fetchData()" class="filter-input clickable">
                        <option value="">All Authors</option>
                        <option>Abhinavagupta</option><option>Utpaladeva</option><option>Vasugupta</option>
                    </select>
                </div>

                <div id="resumeBox" class="hidden mt-8 p-4 bg-orange-900/10 rounded-2xl border border-orange-900/20">
                    <p class="text-[9px] text-[#ff9933] font-black uppercase mb-2">Resume Session</p>
                    <p id="resumeTitle" class="text-[10px] text-stone-300 italic mb-3 truncate">--</p>
                    <button onclick="handleResume()" class="w-full bg-[#ff9933] text-white py-2 rounded-lg text-[10px] font-bold uppercase clickable">Continue</button>
                </div>
            </div>

            <div class="p-6 bg-black border-t border-stone-900">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs text-white font-bold" id="uiName">--</p>
                        <p class="text-[9px] uppercase text-stone-600 font-black tracking-widest" id="uiRole">--</p>
                    </div>
                    <button onclick="handleLogout()" class="text-[10px] font-black text-[#ff9933] hover:text-white uppercase tracking-tighter clickable">Exit Portal</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#fcfaf8] overflow-hidden">
            <section id="v-catalog" class="flex-1 flex flex-col p-10 overflow-hidden">
                <div class="max-w-4xl mx-auto w-full flex flex-col h-full">
                    <h2 class="serif text-5xl text-stone-900 mb-8">Research Repository</h2>
                    <div class="relative mb-10">
                        <span class="absolute left-5 top-5 text-stone-300 text-xl">🔍</span>
                        <input type="text" id="mSearch" oninput="fetchData()" placeholder="Central Search by Volume, Chapter, or IAST Title..." 
                            class="w-full p-5 pl-14 rounded-[30px] shadow-xl border-none outline-none focus:ring-4 focus:ring-orange-500/10 text-lg transition-all">
                    </div>
                    <div id="catalogList" class="flex-1 overflow-y-auto space-y-3 pr-4 pb-10"></div>
                </div>
            </section>

            <section id="v-admin" class="hidden flex-1 p-16 overflow-y-auto">
                <div class="max-w-5xl mx-auto">
                    <h2 class="serif text-4xl mb-12">Institutional Roles</h2>
                    <div class="bg-white rounded-[32px] border border-stone-200 overflow-hidden shadow-sm">
                        <table class="w-full text-left">
                            <thead class="bg-stone-50 text-[10px] uppercase font-black text-stone-400 border-b border-stone-100">
                                <tr><th class="p-8">Identity</th><th class="p-8">Assigned Role</th><th class="p-8 text-right">Action</th></tr>
                            </thead>
                            <tbody id="adminTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <aside id="previewPane" class="w-0 bg-white border-l border-stone-200 flex flex-col overflow-hidden">
            <div id="previewContent" class="p-10 invisible opacity-0 transition-opacity flex flex-col h-full">
                </div>
        </aside>
    </div>

    <script>
        const SB_URL = "https://gcgxcnbimqpfrowesfms.supabase.co";
        const SB_KEY = "sb_publishable_XObSGljjo-VILprIHw_Bxw_FKM7uUOU";
        const kClient = supabase.createClient(SB_URL, SB_KEY);
        let userRole = 'public';
        let isSanskrit = false;

        const translitMap = {
            'a': 'अ', 'A': 'आ', 'i': 'इ', 'I': 'ई', 'u': 'उ', 'U': 'ऊ', 'R': 'ऋ', 'e': 'ए', 'E': 'ऐ', 'o': 'ओ', 'O': 'औ',
            'k': 'क', 'K': 'ख', 'g': 'ग', 'G': 'घ', 'q': 'ङ', 'c': 'च', 'C': 'छ', 'j': 'ज', 'J': 'झ', 'Y': 'ञ',
            't': 'त', 'T': 'थ', 'd': 'द', 'D': 'ध', 'n': 'न', 'p': 'प', 'P': 'फ', 'b': 'ब', 'B': 'भ', 'm': 'म',
            'y': 'य', 'r': 'र', 'l': 'ल', 'v': 'व', 's': 'स', 'S': 'श', 'z': 'ष', 'h': 'ह', '.': '।', ',': '॥', 'M': 'ं', 'H': 'ः'
        };

        async function quickDemo(u) {
            document.getElementById('uIn').value = u;
            document.getElementById('pIn').value = "demo123";
            handleLogin();
        }

        async function handleLogin() {
            const user = document.getElementById('uIn').value;
            const pass = document.getElementById('pIn').value;
            const email = user.includes('@') ? user : user + "@kaula.org";
            const { data, error } = await kClient.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Access Denied"); else location.reload();
        }

        async function initApp() {
            const { data: { session } } = await kClient.auth.getSession();
            if (session) {
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                const { data: profile } = await kClient.from('profiles').select('*').eq('id', session.user.id).single();
                userRole = profile?.role || 'public';
                document.getElementById('uiName').innerText = profile?.full_name || session.user.email.split('@')[0];
                document.getElementById('uiRole').innerText = userRole;
                if (userRole === 'admin') document.getElementById('navAdmin').classList.remove('hidden');
                fetchData();
            }
        }

        async function fetchData() {
            const search = document.getElementById('mSearch').value;
            const shortlist = document.getElementById('sideSearch').value;
            const author = document.getElementById('fAuthor').value;
            let query = kClient.from('manuscripts').select('*');
            if (search) query = query.ilike('search_blob', `%${search}%`);
            if (shortlist) query = query.ilike('title_iast', `%${shortlist}%`);
            if (author) query = query.eq('author', author);
            const { data } = await query.limit(20);
            document.getElementById('catalogList').innerHTML = data.map(m => `
                <div onclick="openPreview(${JSON.stringify(m).replace(/"/g, '&quot;')}, this)" class="bg-white p-6 rounded-[24px] border border-stone-100 flex justify-between items-center hover:border-orange-200 clickable shadow-sm transition-all group">
                    <div>
                        <h4 class="font-bold text-stone-800 group-hover:text-[#ff9933]">${m.title_iast}</h4>
                        <p class="text-[9px] text-stone-400 font-bold uppercase tracking-widest">${m.subject}</p>
                    </div>
                    ${m.last_revision_date ? `<p class="text-[9px] text-[#ff9933] font-bold">Revision: ${new Date(m.last_revision_date).toLocaleDateString()}</p>` : ''}
                </div>
            `).join('');
        }

        function openPreview(m, el) {
            document.querySelectorAll('#catalogList > div').forEach(d => d.classList.remove('active-row'));
            el.classList.add('active-row');
            const pane = document.getElementById('previewPane');
            const content = document.getElementById('previewContent');
            pane.style.width = "650px";
            content.classList.remove('invisible', 'opacity-0');

            const canEdit = ['admin', 'typist', 'proofreader'].includes(userRole);

            content.innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <button onclick="closePane()" class="text-[10px] font-black uppercase text-stone-300 hover:text-black clickable">✕ Close</button>
                    <div class="flex items-center bg-stone-100 p-1 rounded-full px-4 border">
                        <span class="text-[9px] font-black text-stone-500 uppercase mr-3">Sanskrit Mode</span>
                        <input type="checkbox" onchange="isSanskrit = this.checked" class="w-4 h-4 clickable accent-[#ff9933]">
                    </div>
                </div>
                <h2 class="serif text-4xl mb-2">${m.title_iast}</h2>
                <div class="flex-1 flex flex-col">
                    <textarea id="liveEditor" ${!canEdit ? 'readonly' : ''} onkeypress="handleTranslit(event)"
                        class="flex-1 w-full p-8 bg-stone-50 border border-stone-100 rounded-[40px] font-serif text-xl leading-relaxed outline-none resize-none">${m.content || ''}</textarea>
                </div>
                ${canEdit ? `<button onclick="saveChanges(${m.id})" class="mt-6 py-4 rounded-2xl text-white font-bold text-xs uppercase bg-[#ff9933] clickable shadow-xl">Update & Timestamp</button>` : ''}
                <button class="w-full mt-3 bg-white border py-3 rounded-2xl text-[9px] font-black uppercase clickable">Download PDF</button>
            `;
        }

        function handleTranslit(e) {
            if (!isSanskrit) return;
            const textarea = e.target;
            const char = e.key;
            if (translitMap[char]) {
                e.preventDefault();
                const start = textarea.selectionStart;
                textarea.value = textarea.value.substring(0, start) + translitMap[char] + textarea.value.substring(textarea.selectionEnd);
                textarea.selectionStart = textarea.selectionEnd = start + 1;
            }
        }

        async function saveChanges(id) {
            const val = document.getElementById('liveEditor').value;
            const { error } = await kClient.from('manuscripts').update
